<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go/No-Go Task</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

    <style>
        :root {
            --primary-color: #4f46e5; /* Modern Indigo */
            --primary-hover: #4338ca;
            --bg-color: #f8fafc; /* Slate 50 */
            --card-bg: #ffffff;
            --text-main: #0f172a; /* Slate 900 */
            --text-muted: #64748b; /* Slate 500 */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Reusable Card Style */
        .card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        /* Screen 1: Welcome */
        #welcome-screen {
            display: block; /* Shown by default */
        }

        .lab-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 16px 0;
            color: var(--text-main);
        }

        p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            font-family: inherit;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button {
            width: 100%;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 500;
            font-family: inherit;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover { background-color: var(--primary-hover); }
        button:active { transform: scale(0.98); }

        /* Screen 2: The Task */
        #task-screen {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--card-bg);
            z-index: 10;
        }

        #target-circle {
            display: none; 
            position: absolute;
            width: 100px; 
            height: 100px;
            background-color: #ef4444; /* Modern Red */
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.4);
            transition: transform 0.1s;
        }

        #target-circle:active { transform: scale(0.95); }

        /* Loading / Message Overlay */
        #message-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.9);
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: 500;
            color: var(--text-main);
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: var(--primary-color);
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Screen 3: Results */
        #results-screen {
            display: none;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 5;
        }

        #chart-container {
            width: 100%;
            height: 50vh;
            margin-top: 20px;
        }
        
        #user-avg-text {
            font-size: 28px;
            font-weight: 600;
            color: var(--primary-color);
            margin: 10px 0 0 0;
        }
    </style>
</head>
<body>

    <div id="welcome-screen" class="card">
        <div class="lab-title">Mohebi & Associates</div>
        <h1>Go/No-Go Task</h1>
        <p>Please enter your Participant ID below. If left blank, a random identifier will be generated.</p>
        
        <div class="input-group">
            <label for="participant-id">Participant ID</label>
            <input type="text" id="participant-id" placeholder="e.g., SUBJ-001" autocomplete="off">
        </div>
        
        <button id="start-btn">Begin Task</button>
    </div>

    <div id="task-screen">
        <div id="target-circle"></div>
    </div>

    <div id="message-overlay">
        <div class="spinner"></div>
        <span id="loading-text">Submitting data...</span>
    </div>

    <div id="results-screen" class="card">
        <h2>Task Complete</h2>
        <div id="user-avg-text"></div>
        <p>Your performance compared to historical data.</p>
        <div id="chart-container">
            <canvas id="rtChart"></canvas>
        </div>
    </div>

    <script>
        // Ensure script runs after DOM is fully loaded
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- Configuration & Variables ---
            const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzLMm8FHKix3Es69s_2xgeiwoDSRULhzr2PGLC1GvsAAzFmo9yWhx0OeamVuz-RUKoKGg/exec";
            const TOTAL_TRIALS = 10;
            const CIRCLE_RADIUS = 50; 
            const DELAY_MS = 500;

            let participantId = "";
            let currentTrial = 0;
            let appearanceTime = 0;
            let reactionTimes = []; 

            // DOM Elements
            const welcomeScreen = document.getElementById('welcome-screen');
            const taskScreen = document.getElementById('task-screen');
            const targetCircle = document.getElementById('target-circle');
            const messageOverlay = document.getElementById('message-overlay');
            const loadingText = document.getElementById('loading-text');
            const resultsScreen = document.getElementById('results-screen');
            const idInput = document.getElementById('participant-id');
            const startBtn = document.getElementById('start-btn');

            // --- Event Listeners ---
            startBtn.addEventListener('click', startExperiment);
            targetCircle.addEventListener('mousedown', recordClick); // mousedown is slightly more accurate for RT than click

            // --- Experiment Flow ---

            function startExperiment() {
                participantId = idInput.value.trim();
                if (participantId === "") {
                    participantId = "AUTO-" + Math.random().toString(36).substring(2, 8).toUpperCase();
                }

                welcomeScreen.style.display = 'none';
                taskScreen.style.display = 'block';

                setTimeout(showTarget, DELAY_MS);
            }

            function showTarget() {
                if (currentTrial >= TOTAL_TRIALS) {
                    endExperiment();
                    return;
                }

                const maxX = window.innerWidth - (CIRCLE_RADIUS * 2);
                const maxY = window.innerHeight - (CIRCLE_RADIUS * 2);

                const randomX = Math.floor(Math.random() * maxX);
                const randomY = Math.floor(Math.random() * maxY);

                targetCircle.style.left = randomX + 'px';
                targetCircle.style.top = randomY + 'px';
                targetCircle.style.display = 'block';

                appearanceTime = Date.now();
            }

            function recordClick() {
                const clickTime = Date.now();
                const rt = clickTime - appearanceTime;

                reactionTimes.push(rt);

                targetCircle.style.display = 'none';
                currentTrial++;

                setTimeout(showTarget, DELAY_MS);
            }

            async function endExperiment() {
                const totalRT = reactionTimes.reduce((acc, curr) => acc + curr, 0);
                const userAvgRT = totalRT / reactionTimes.length;

                taskScreen.style.display = 'none';
                messageOverlay.style.display = 'flex';
                loadingText.innerText = "Submitting data...";

                const fetchPromises = reactionTimes.map((rt, index) => {
                    const payload = {
                        "Participant_ID": participantId,
                        "Trial_Number": index + 1,
                        "Reaction_Time": rt
                    };

                    return fetch(WEB_APP_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                        body: JSON.stringify(payload)
                    });
                });

                try {
                    await Promise.all(fetchPromises);
                    
                    loadingText.innerText = "Fetching historical data...";
                    
                    const response = await fetch(WEB_APP_URL);
                    let historicalRTs = await response.json();
                    
                    historicalRTs = historicalRTs.map(Number).filter(n => !isNaN(n));
                    historicalRTs = historicalRTs.concat(reactionTimes); 

                    renderHistogram(historicalRTs, userAvgRT);

                } catch (error) {
                    console.error("Error:", error);
                    loadingText.innerText = "Database connection error. Please refresh.";
                    document.querySelector('.spinner').style.display = 'none';
                }
            }

            function renderHistogram(allData, userAvg) {
                messageOverlay.style.display = 'none';
                resultsScreen.style.display = 'block';

                document.getElementById('user-avg-text').innerText = `${Math.round(userAvg)} ms`;

                const binSize = 50; 
                const minRT = Math.floor(Math.min(...allData) / binSize) * binSize;
                const maxRT = Math.ceil(Math.max(...allData) / binSize) * binSize;

                const bins = {};
                for (let i = minRT; i <= maxRT; i += binSize) {
                    bins[i] = 0;
                }

                allData.forEach(rt => {
                    const bin = Math.floor(rt / binSize) * binSize;
                    bins[bin]++;
                });

                const labels = Object.keys(bins);
                const dataCounts = Object.values(bins);

                // Register chart components
                Chart.register(window['chartjs-plugin-annotation']);

                const ctx = document.getElementById('rtChart').getContext('2d');
                
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Frequency',
                            data: dataCounts,
                            backgroundColor: '#818cf8', // Soft Indigo
                            borderColor: '#4f46e5',
                            borderWidth: 1,
                            barPercentage: 1,
                            categoryPercentage: 1 
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: { title: { display: true, text: 'Reaction Time (ms)' } },
                            y: { beginAtZero: true, title: { display: true, text: 'Count' } }
                        },
                        plugins: {
                            legend: { display: false },
                            annotation: {
                                annotations: {
                                    line1: {
                                        type: 'line',
                                        scaleID: 'x',
                                        value: labels.reduce((prev, curr) => Math.abs(curr - userAvg) < Math.abs(prev - userAvg) ? curr : prev),
                                        borderColor: '#ef4444', // Red
                                        borderWidth: 3,
                                        borderDash: [5, 5],
                                        label: {
                                            display: true,
                                            content: 'Your Avg',
                                            position: 'start',
                                            backgroundColor: '#ef4444'
                                        }
                                    }
                                }
                            }
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
